<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 Movie Recommender</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f8f9fa, #ffe5e0);
      padding: 40px;
      text-align: center;
    }
    h1 {
      color: #ff4d4d;
      font-size: 2.5rem;
      margin-bottom: 20px;
    }
    form {
      margin-bottom: 30px;
    }
    input {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      width: 250px;
      font-size: 1rem;
    }
    button {
      padding: 10px 15px;
      border: none;
      border-radius: 8px;
      background-color: #ff4d4d;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background-color: #ff6b6b;
    }
    /* Flex container for movie cards */
    .movies-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px; /* space between cards */
      margin-top: 20px;
    }
    .movie {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      width: 220px; /* smaller width to fit multiple cards in a row */
      text-align: left;
      flex-shrink: 0; /* prevent shrinking */
      transition: transform 0.2s;
    }
    .movie:hover {
      transform: translateY(-5px);
    }
    .movie h2 {
      margin-top: 0;
      font-size: 1.2rem;
      color: #333;
    }
    .movie p {
      margin: 5px 0;
      color: #555;
    }
    .movie a {
      text-decoration: none;
      color: #ff4d4d;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🎬 Movie Recommendation System</h1>
  <form method="POST">
    <input type="text" name="movie" placeholder="Enter movie name" value="{{ movie_name }}" required>
    <button type="submit">Recommend</button>
  </form>

  {% if recommendations %}
    <div class="movies-container">
      {% for rec in recommendations %}
        <div class="movie">
          <h2>{{ rec.title }}</h2>
          <p><strong>Genres:</strong> {{ rec.genres }}</p>
          <p><strong>Rating:</strong> ⭐ {{ rec.rating }}/10</p>
          <p><a href="{{ rec.trailer }}" target="_blank">🎥 Watch Trailer</a></p>
        </div>
      {% endfor %}
    </div>
  {% elif movie_name %}
    <p>No match found for "{{ movie_name }}" 😢</p>
  {% endif %}
</body>
</html>
